<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Latar Belakang Solid Penuh (Akan dipotong jadi lingkaran oleh OS) -->
  <rect width="512" height="512" fill="#050816"/>
  
  <!-- Efek Cahaya Latar -->
  <circle cx="256" cy="256" r="160" fill="#38bdf8" opacity="0.1" filter="blur(40px)"/>

  <!-- SAFE ZONE: Skala 0.75 agar aman 100% dari potongan melingkar -->
  <g transform="scale(0.75) translate(85, 85)">
      <!-- Lantai Dasar (Base Plane) -->
      <path d="M 256 180 L 416 260 L 256 340 L 96 260 Z" fill="#0B1120" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
      
      <!-- Garis Grid Spasial di Lantai -->
      <path d="M 176 220 L 336 300 M 336 220 L 176 300" stroke="#1e293b" stroke-width="2" opacity="0.5"/>

      <!-- Gedung 1 (Kiri Belakang) -->
      <g stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3" stroke-linejoin="round">
          <path d="M 166 150 L 196 165 L 166 180 L 136 165 Z" fill="#1e293b"/>
          <path d="M 136 165 L 136 245 L 166 260 L 166 180 Z" fill="#0f172a"/>
          <path d="M 166 180 L 166 260 L 196 245 L 196 165 Z" fill="#050816"/>
      </g>

      <!-- Gedung 2 (Kanan Belakang) -->
      <g stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3" stroke-linejoin="round">
          <path d="M 346 110 L 386 130 L 346 150 L 306 130 Z" fill="#1e293b"/>
          <path d="M 306 130 L 306 250 L 346 270 L 346 150 Z" fill="#0f172a"/>
          <path d="M 346 150 L 346 270 L 386 250 L 386 130 Z" fill="#050816"/>
      </g>

      <!-- GARIS RUTE (Path) -->
      <path d="M 126 265 L 186 295 L 256 260 L 326 295 L 376 270" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 126 265 L 186 295 L 256 260 L 326 295 L 376 270" stroke="#38bdf8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="blur(3px)"/>

      <!-- Titik Awal (Start Node) -->
      <circle cx="126" cy="265" r="10" fill="#050816" stroke="#38bdf8" stroke-width="4"/>
      <circle cx="126" cy="265" r="4" fill="#38bdf8"/>
      
      <!-- Titik Tujuan (Target Node) -->
      <circle cx="376" cy="270" r="12" fill="#050816" stroke="#fbbf24" stroke-width="4"/>
      <circle cx="376" cy="270" r="5" fill="#fbbf24"/>
      <circle cx="376" cy="270" r="24" fill="#fbbf24" opacity="0.2" filter="blur(4px)"/>

      <!-- Gedung 3 (Tengah Depan) -->
      <g stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3" stroke-linejoin="round">
          <path d="M 256 220 L 286 235 L 256 250 L 226 235 Z" fill="#1e293b"/>
          <path d="M 226 235 L 226 305 L 256 320 L 256 250 Z" fill="#0f172a"/>
          <path d="M 256 250 L 256 320 L 286 305 L 286 235 Z" fill="#050816"/>
      </g>
  </g>
</svg>
